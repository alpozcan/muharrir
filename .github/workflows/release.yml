name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build release binary
        run: swift build -c release

      - name: Package binary
        run: |
          BINARY_PATH=$(swift build -c release --show-bin-path)/muharrir
          cp "$BINARY_PATH" muharrir
          tar czf muharrir-macos-arm64.tar.gz muharrir
          shasum -a 256 muharrir-macos-arm64.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            muharrir-macos-arm64.tar.gz
            checksums.txt
          generate_release_notes: true
